<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Styles for the card flip animation */
        .card {
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden; /* Safari */
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .card-face-front {
            transform: rotateY(180deg);
        }
        /* Prevent selection of text on cards */
        .card-face-front {
            user-select: none; /* Standard syntax */
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* Internet Explorer/Edge */
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-indigo-200 dark:from-slate-800 dark:to-slate-900 text-slate-800 dark:text-slate-100 flex flex-col items-center justify-center min-h-screen p-4 transition-colors">

    <div class="w-full max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-4xl md:text-5xl font-bold text-slate-700">Memory Challenge</h1>
            <p class="text-slate-500 mt-2">Match all the pairs to win the game!</p>
        </header>

        <!-- Game Info Bar -->
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center bg-white dark:bg-slate-800 rounded-lg shadow-md p-4 mb-6 space-y-2 sm:space-y-0">
            <div class="flex space-x-6">
                <div class="text-lg">
                    <span class="font-semibold">Moves:</span>
                    <span id="moves-count" class="font-bold text-indigo-600 dark:text-indigo-400">0</span>
                </div>
                <div class="text-lg">
                    <span class="font-semibold">Time:</span>
                    <span id="timer" class="font-bold text-indigo-600 dark:text-indigo-400">0:00</span>
                </div>
            </div>
            <div class="flex space-x-2">
                <button id="settings-button" class="px-4 py-2 bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-200 font-semibold rounded-lg shadow-md hover:bg-slate-300 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75 transition-colors">Settings</button>
                <button id="restart-button" class="px-4 py-2 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75 transition-colors">Restart</button>
            </div>
        </div>

        <!-- Game Board -->
        <main class="perspective-1000">
            <section id="game-board" class="grid gap-3 sm:gap-4">
                <!-- Cards will be generated by JavaScript -->
            </section>
        </main>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center hidden transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-8 text-center transform scale-95 transition-transform duration-300">
            <h2 class="text-4xl font-bold text-yellow-500 mb-4">You Won!</h2>
            <p class="text-lg text-slate-600 mb-2">Congratulations, you are a memory master!</p>
            <p id="win-stats" class="text-slate-500 mb-6">You completed the game in X moves and 0:00.</p>
            <button id="play-again-button" class="w-full px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75 transition-colors">
                Play Again
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center hidden">
        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 w-80 text-slate-800 dark:text-slate-100">
            <h2 class="text-2xl font-bold mb-4">Settings</h2>
            <label class="block mb-4">Board Size
                <select id="board-size" class="mt-1 block w-full border border-slate-300 dark:border-slate-700 rounded p-2 bg-white dark:bg-slate-700">
                    <option value="4">4 x 4</option>
                    <option value="6">6 x 6</option>
                    <option value="8">8 x 8</option>
                </select>
            </label>
            <label class="flex items-center mb-6">
                <input id="dark-mode-toggle" type="checkbox" class="mr-2">
                <span>Dark Mode</span>
            </label>
            <div class="flex justify-end space-x-2">
                <button id="close-settings" class="px-4 py-2 bg-slate-200 dark:bg-slate-700 rounded">Cancel</button>
                <button id="save-settings" class="px-4 py-2 bg-indigo-600 text-white rounded">Save</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Elements ---
            const gameBoard = document.getElementById('game-board');
            const movesCountEl = document.getElementById('moves-count');
            const restartButton = document.getElementById('restart-button');
            const playAgainButton = document.getElementById('play-again-button');
            const winModal = document.getElementById('win-modal');
            const winStatsEl = document.getElementById('win-stats');
            const timerEl = document.getElementById('timer');
            const settingsButton = document.getElementById('settings-button');
            const settingsModal = document.getElementById('settings-modal');
            const saveSettingsButton = document.getElementById('save-settings');
            const closeSettingsButton = document.getElementById('close-settings');
            const boardSizeSelect = document.getElementById('board-size');
            const darkModeToggle = document.getElementById('dark-mode-toggle');

            // --- Game Configuration ---
            const symbols = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞','🐜','🦂','🐢','🐍'];
            let boardSize = 4; // Default grid dimension (4x4)
            let totalPairs = (boardSize * boardSize) / 2;

            // --- Game State Variables ---
            let cards = [];
            let flippedCards = [];
            let matchedPairs = 0;
            let moves = 0;
            let isBoardLocked = false;
            let timerInterval;
            let timeElapsed = 0;

            // --- Functions ---

            /**
             * Shuffles an array in place using the Fisher-Yates algorithm.
             * @param {Array} array The array to shuffle.
             * @returns {Array} The shuffled array.
             */
            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            /**
             * Initializes and starts a new game.
             */
            function startGame() {
                // Reset game state
                isBoardLocked = false;
                flippedCards = [];
                matchedPairs = 0;
                moves = 0;
                updateMoves();

                totalPairs = (boardSize * boardSize) / 2;

                // Reset and start timer
                clearInterval(timerInterval);
                timeElapsed = 0;
                updateTimer();
                timerInterval = setInterval(() => {
                    timeElapsed++;
                    updateTimer();
                }, 1000);

                // Hide win modal
                winModal.classList.add('hidden');
                winModal.firstElementChild.classList.remove('scale-100');
                winModal.firstElementChild.classList.add('scale-95');

                // Create and shuffle card symbols
                const gameSymbols = symbols.slice(0, totalPairs);
                const cardDeck = shuffle([...gameSymbols, ...gameSymbols]);

                // Clear the board and create new cards
                gameBoard.innerHTML = '';
                cards = []; // Clear the cards array
                gameBoard.style.gridTemplateColumns = `repeat(${boardSize}, minmax(0, 1fr))`;

                cardDeck.forEach(symbol => {
                    const cardElement = createCard(symbol);
                    gameBoard.appendChild(cardElement);
                    cards.push(cardElement);
                });
            }

            /**
             * Creates a card element with front and back faces.
             * @param {string} symbol The symbol for the card's front face.
             * @returns {HTMLElement} The created card element.
             */
            function createCard(symbol) {
                const card = document.createElement('div');
                card.className = 'card aspect-square';
                card.dataset.symbol = symbol;

                card.innerHTML = `
                    <div class="card-face card-face-back w-full h-full rounded-lg bg-indigo-500 shadow-md flex items-center justify-center text-3xl text-white">
                        ?
                    </div>
                    <div class="card-face card-face-front w-full h-full rounded-lg bg-white dark:bg-slate-700 shadow-lg flex items-center justify-center text-4xl md:text-5xl">
                        ${symbol}
                    </div>
                `;

                card.addEventListener('click', () => handleCardClick(card));
                return card;
            }

            /**
             * Handles the logic when a card is clicked.
             * @param {HTMLElement} card The card element that was clicked.
             */
            function handleCardClick(card) {
                if (isBoardLocked || card.classList.contains('is-flipped') || flippedCards.includes(card)) {
                    return; // Ignore clicks if board is locked, card is already flipped or is one of the current two flipped cards
                }

                flipCard(card);
                flippedCards.push(card);

                if (flippedCards.length === 2) {
                    incrementMoves();
                    checkForMatch();
                }
            }

            /**
             * Flips a card over by adding/removing the 'is-flipped' class.
             * @param {HTMLElement} card The card to flip.
             */
            function flipCard(card) {
                card.classList.add('is-flipped');
            }

            /**
             * Unflips a card by removing the 'is-flipped' class.
             * @param {HTMLElement} card The card to unflip.
             */
            function unflipCard(card) {
                card.classList.remove('is-flipped');
            }

            /**
             * Checks if the two currently flipped cards are a match.
             */
            function checkForMatch() {
                isBoardLocked = true;
                const [cardOne, cardTwo] = flippedCards;

                if (cardOne.dataset.symbol === cardTwo.dataset.symbol) {
                    // It's a match!
                    disableMatchedCards();
                } else {
                    // Not a match
                    unflipMismatchedCards();
                }
            }

            /**
             * Disables matched cards and checks for a win condition.
             */
            function disableMatchedCards() {
                const [cardOne, cardTwo] = flippedCards;
                cardOne.removeEventListener('click', handleCardClick);
                cardTwo.removeEventListener('click', handleCardClick);
                matchedPairs++;
                resetBoard();

                if (matchedPairs === totalPairs) {
                    setTimeout(showWinModal, 800);
                }
            }

            /**
             * Flips mismatched cards back over after a short delay.
             */
            function unflipMismatchedCards() {
                setTimeout(() => {
                    flippedCards.forEach(unflipCard);
                    resetBoard();
                }, 1200); // 1.2 second delay to see the cards
            }


            /**
             * Resets the flipped cards array and unlocks the board.
             */
            function resetBoard() {
                flippedCards = [];
                isBoardLocked = false;
            }

            /**
             * Increments the move counter and updates the display.
             */
            function incrementMoves() {
                moves++;
                updateMoves();
            }
            
            /**
             * Updates the move counter display.
             */
            function updateMoves() {
                movesCountEl.textContent = moves;
            }

            /**
             * Updates the timer display.
             */
            function updateTimer() {
                const minutes = Math.floor(timeElapsed / 60);
                const seconds = timeElapsed % 60;
                timerEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }

            /**
             * Displays the win modal with final stats.
             */
            function showWinModal() {
                clearInterval(timerInterval);
                winStatsEl.textContent = `You completed the game in ${moves} moves and ${timerEl.textContent}.`;
                winModal.classList.remove('hidden');
                setTimeout(() => {
                    winModal.firstElementChild.classList.add('scale-100');
                }, 50); // Small delay for the transition to trigger
            }

            function openSettings() {
                boardSizeSelect.value = boardSize;
                darkModeToggle.checked = document.documentElement.classList.contains('dark');
                settingsModal.classList.remove('hidden');
            }

            function closeSettings() {
                settingsModal.classList.add('hidden');
            }

            // --- Event Listeners ---
            restartButton.addEventListener('click', startGame);
            playAgainButton.addEventListener('click', startGame);
            settingsButton.addEventListener('click', openSettings);
            closeSettingsButton.addEventListener('click', closeSettings);
            saveSettingsButton.addEventListener('click', () => {
                boardSize = parseInt(boardSizeSelect.value, 10);
                document.documentElement.classList.toggle('dark', darkModeToggle.checked);
                closeSettings();
                startGame();
            });

            // --- Initial Game Start ---
            startGame();
        });
    </script>
</body>
</html>
